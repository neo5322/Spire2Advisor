name: CI Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'QuestceSpire/**'
      - '*.md'

jobs:
  build-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Create local.props with stub paths
        shell: pwsh
        run: |
          @"
          <Project>
            <PropertyGroup>
              <STS2GamePath>${{ github.workspace }}\game_stub</STS2GamePath>
              <GodotExePath>C:\stub\godot.exe</GodotExePath>
            </PropertyGroup>
          </Project>
          "@ | Out-File -FilePath QuestceSpire\local.props -Encoding utf8

      - name: Create game DLL stubs
        shell: pwsh
        run: |
          $stubDir = "game_stub\data_sts2_windows_x86_64"
          mkdir $stubDir -Force
          # Create minimal stub DLLs so dotnet restore succeeds
          # Actual compilation will fail on missing types, but restore + syntax check works
          foreach ($dll in @("0Harmony.dll", "GodotSharp.dll", "sts2.dll")) {
            [System.IO.File]::WriteAllBytes("$stubDir\$dll", [byte[]]@())
          }

      - name: Restore dependencies
        shell: pwsh
        run: |
          cd QuestceSpire
          dotnet restore

      - name: Build (syntax + dependency check)
        shell: pwsh
        run: |
          cd QuestceSpire
          dotnet build -c Release 2>&1 | Tee-Object -FilePath build.log
          # Note: Build may fail due to missing game DLL types.
          # This step validates project structure, NuGet deps, and catches syntax errors.
        continue-on-error: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: QuestceSpire/build.log
          retention-days: 7
